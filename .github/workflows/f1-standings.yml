name: F1 Standings Refresh

on:
  schedule:
    # 09:15 Asia/Shanghai daily; no-op when formula1.com has no new completed race.
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  refresh-f1-standings:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Refresh F1 standings from formula1.com
        run: python3 scripts/update_f1_standings.py --no-commit

      - name: Guard deploy config
        run: node scripts/guard-deploy.js

      - name: Verify Vercel build
        run: |
          node scripts/prepare-vercel-build.js
          npx vercel build

      - name: Commit updated F1 standings
        id: commit
        run: |
          if [ -z "$(git status --porcelain -- index.html)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No F1 standings changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "f1: refresh standings from formula1.com"
          git pull --rebase origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
