name: Cloud Digests

on:
  schedule:
    # 07:45 Asia/Shanghai
    - cron: '45 23 * * *'
    # 08:00 Asia/Shanghai
    - cron: '0 0 * * *'
    # 12:00 Asia/Shanghai
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      digest:
        description: Digest to generate
        required: true
        default: weather
        type: choice
        options:
          - weather
          - clawfeed-morning
          - clawfeed-noon

permissions:
  contents: write

concurrency:
  group: cloud-digests-${{ github.event.inputs.digest || github.run_id }}
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Resolve digest
        id: digest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DIGEST="${{ inputs.digest }}"
          else
            HOUR=$(TZ=Asia/Shanghai date +%H)
            if [ "$HOUR" = "07" ]; then
              DIGEST=weather
            elif [ "$HOUR" = "08" ]; then
              DIGEST=clawfeed-morning
            else
              DIGEST=clawfeed-noon
            fi
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Using digest: $DIGEST"

      - name: Generate digest file
        run: |
          mkdir -p data/briefings
          case "${{ steps.digest.outputs.digest }}" in
            weather)
              python3 scripts/send_wechat_weather.py --source live > data/briefings/weather.txt
              ;;
            clawfeed-morning)
              python3 scripts/generate_clawfeed_digest.py --edition morning > data/briefings/clawfeed-morning.txt
              ;;
            clawfeed-noon)
              python3 scripts/generate_clawfeed_digest.py --edition noon > data/briefings/clawfeed-noon.txt
              ;;
            *)
              echo "Unknown digest type" >&2
              exit 1
              ;;
          esac

      - name: Commit generated digest
        run: |
          FILE="data/briefings"
          if git diff --quiet -- "$FILE"; then
            echo "No digest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/briefings
          git commit -m "digests: refresh ${{ steps.digest.outputs.digest }}"
          git push
